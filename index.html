<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/PIEZAS.jfif" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Ludo temático de Plants vs. Zombies. Juega localmente con hasta 4 jugadores humanos o controlados por la CPU." />
    <title>PvZ Ludo - Crazy Dave's Yard</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#10b981" />
    
    <!-- Google Fonts: Bubblegum Sans for playful PvZ headers, Outfit for UI text -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  </head>
  <body class="bg-[#111827] text-gray-100 overflow-x-hidden select-none">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker registrado:', reg.scope))
            .catch(err => console.warn('Service Worker falló:', err));
        });
      }
    </script>
  </body>
</html>
